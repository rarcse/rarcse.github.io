<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Germany CS Universities — Priority Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --green: #4caf72;
    --blue: #4c8ecf;
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --muted: #7a8099;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html {
    height: 100%;
    -webkit-text-size-adjust: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 1000;
  }

  .header-title {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .header-title span {
    color: var(--gold);
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .legend {
    display: flex;
    gap: 14px;
    margin-left: auto;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-gold { background: var(--gold); }

  .legend-border {
    width: 16px;
    height: 12px;
    border: 2px solid var(--gold);
    border-radius: 2px;
    background: rgba(201, 168, 76, 0.15);
    flex-shrink: 0;
  }
  .dot-green { background: var(--green); }
  .dot-blue { background: var(--blue); }

  .stats {
    display: flex;
    gap: 16px;
    padding: 0 4px;
    border-left: 1px solid var(--border);
    margin-left: 6px;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 16px;
    line-height: 1;
    color: var(--gold);
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-search {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }

  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 11px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--gold); }

  .filter-btns {
    display: flex;
    gap: 4px;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
  }

  .filter-btn.active-green { background: var(--green); color: #000; border-color: var(--green); }
  .filter-btn.active-blue { background: var(--blue); color: #000; border-color: var(--blue); }
  .filter-btn.active-bookmark { background: #e8b84a; color: #000; border-color: #e8b84a; }

  .filter-btns { width: 100%; }

  .bookmark-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0 14px 10px;
    border-bottom: 1px solid var(--border);
  }

  .bookmark-count {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .bookmark-count strong {
    color: var(--gold-light);
    font-weight: 600;
  }

  .bookmark-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .bookmark-action-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 5px 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    min-height: 28px;
  }

  .bookmark-action-btn:hover {
    color: var(--gold);
    border-color: rgba(201,168,76,0.4);
  }

  .bookmark-action-btn.primary {
    color: var(--gold);
    border-color: rgba(201,168,76,0.35);
  }

  .bookmark-action-btn.primary:hover {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
  }

  .bookmark-action-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  .bookmark-action-btn.active-watchlist {
    background: rgba(201,168,76,0.18);
    color: var(--gold-light);
    border-color: var(--gold);
  }

  .uni-item.bookmarked {
    background: rgba(201,168,76,0.04);
  }

  .bookmark-btn {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    margin-top: -2px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
  }

  .bookmark-btn:hover {
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
  }

  .bookmark-btn.saved {
    color: var(--gold);
  }

  .bookmark-btn:active { transform: scale(0.92); }

  .list-empty {
    padding: 28px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.6;
  }

  .list-empty code {
    color: var(--gold-light);
    font-size: 10px;
  }

  .list-empty-icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  .toast {
    position: fixed;
    bottom: calc(72px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--surface);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 11px;
    padding: 10px 16px;
    border-radius: 8px;
    z-index: 1200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.45);
    max-width: calc(100vw - 32px);
    text-align: center;
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (min-width: 769px) {
    .toast { bottom: 24px; }
  }

  .uni-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .uni-list::-webkit-scrollbar { width: 4px; }
  .uni-list::-webkit-scrollbar-track { background: transparent; }
  .uni-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .uni-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .uni-item:hover { background: var(--surface2); }
  .uni-item.active { background: rgba(201,168,76,0.1); border-left: 3px solid var(--gold); padding-left: 11px; }

  .uni-rank {
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 700;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .rank-gold { background: var(--gold); color: #000; }
  .rank-green { background: var(--green); color: #000; }
  .rank-blue { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .uni-info { flex: 1; min-width: 0; }

  .uni-name {
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .uni-prog {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .uni-tags {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
  }

  .tag-free { background: rgba(76,175,114,0.15); color: #6fcf8a; }
  .tag-fee { background: rgba(229,115,50,0.15); color: #e07a40; }
  .tag-varied { background: rgba(100,130,200,0.15); color: #7eaadf; }
  .tag-jobs-h { background: rgba(201,168,76,0.15); color: #d4b050; }
  .tag-jobs-m { background: rgba(120,120,140,0.15); color: #9090aa; }
  .tag-sem3 { background: rgba(150,80,200,0.1); color: #b070d0; }

  /* ── Map ── */
  #map {
    flex: 1;
    background: #e8e4dc;
  }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    color: var(--text) !important;
    font-family: var(--font-mono) !important;
    padding: 0 !important;
  }

  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 0 !important; width: 280px !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }

  .popup-inner {
    padding: 16px;
  }

  .popup-rank-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .popup-badge {
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 700;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .popup-tier {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .tier-top { background: rgba(201,168,76,0.2); color: var(--gold-light); }
  .tier-good { background: rgba(76,175,114,0.2); color: #7fd09a; }
  .tier-reasonable { background: rgba(120,130,160,0.15); color: #9090aa; }

  .popup-uni-name {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 3px;
  }

  .popup-prog-name {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .popup-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    margin-bottom: 6px;
  }

  .popup-label { color: var(--muted); }
  .popup-value { color: var(--text); font-weight: 500; }

  .popup-note {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border-radius: 6px;
    padding: 8px 10px;
    margin-top: 10px;
    line-height: 1.5;
    border-left: 2px solid var(--gold);
  }

  .popup-link {
    display: block;
    text-align: center;
    margin-top: 12px;
    font-size: 11px;
    color: var(--gold);
    text-decoration: none;
    padding: 7px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 6px;
    transition: all 0.15s;
  }

  .popup-link:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  .popup-prog-count {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .popup-prog-block {
    padding-top: 2px;
  }

  .popup-prog-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .popup-prog-title {
    font-family: var(--font-head);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .popup-inner.scrollable {
    max-height: min(70vh, 520px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* Custom marker */
  .custom-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 11px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .custom-marker:hover { transform: scale(1.2); }

  /* ── Mobile controls ── */
  .mobile-list-toggle {
    display: none;
    position: fixed;
    bottom: calc(16px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 1100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text);
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.45);
    align-items: center;
    gap: 8px;
    min-height: 44px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, border-color 0.15s;
  }

  .mobile-list-toggle:hover,
  .mobile-list-toggle.active {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
  }

  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1040;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .sidebar-backdrop.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .sidebar-handle {
    display: none;
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 8px auto 4px;
    flex-shrink: 0;
  }

  /* ── Tablet ── */
  @media (max-width: 900px) {
    header {
      flex-wrap: wrap;
      gap: 10px 16px;
      padding: 10px 14px;
    }

    .legend {
      margin-left: 0;
      flex-wrap: wrap;
      gap: 8px 12px;
      width: 100%;
      order: 3;
    }

    .stats {
      margin-left: auto;
      border-left: none;
      padding: 0;
    }
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    header {
      padding: 10px 12px;
      gap: 8px;
    }

    .header-title { font-size: 15px; }
    .header-sub { display: none; }

    .legend {
      gap: 6px 10px;
    }

    .legend-item { font-size: 10px; }

    .stats {
      width: 100%;
      justify-content: space-around;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 2px;
      order: 2;
    }

    .stat-num { font-size: 14px; }

    .main {
      position: relative;
      flex: 1;
    }

    #map {
      position: absolute;
      inset: 0;
      flex: none;
      width: 100%;
      height: 100%;
    }

    .mobile-list-toggle { display: flex; }

    .sidebar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-height: 72vh;
      max-height: 72dvh;
      border-right: none;
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      z-index: 1050;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
      visibility: hidden;
    }

    .sidebar.open {
      transform: translateY(0);
      visibility: visible;
    }

    .sidebar-handle { display: block; }

    .sidebar-backdrop { display: block; }

    .sidebar-search {
      flex-direction: column;
      padding: 0 12px 12px;
      gap: 10px;
    }

    .filter-btns {
      width: 100%;
      justify-content: stretch;
    }

    .filter-btn {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      font-size: 10px;
      min-height: 44px;
    }

    .bookmark-bar {
      padding: 0 12px 12px;
      flex-wrap: wrap;
    }

    .bookmark-action-btn {
      font-size: 11px;
      padding: 8px 10px;
      min-height: 36px;
    }

    .bookmark-btn {
      width: 40px;
      height: 40px;
      font-size: 18px;
    }

    .search-input {
      font-size: 16px;
      padding: 12px 14px;
      min-height: 44px;
    }

    .uni-item {
      padding: 12px 14px;
      min-height: 44px;
    }

    .uni-name { white-space: normal; }
    .uni-prog { white-space: normal; }

    .leaflet-popup-content {
      width: min(280px, calc(100vw - 48px)) !important;
    }

    .leaflet-control-zoom {
      margin-bottom: calc(64px + env(safe-area-inset-bottom)) !important;
    }

    .leaflet-popup-close-button {
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
    }
  }

  @media (max-width: 380px) {
    .legend-item:nth-child(4) { display: none; }
    .stat-label { font-size: 8px; }
  }

</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Germany CS <span>University Map</span></div>
    <div class="header-sub">32 programs · ranked by reputation + part-time job market</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-gold"></div>Top priority</div>
    <div class="legend-item"><div class="legend-dot dot-green"></div>Good choice</div>
    <div class="legend-item"><div class="legend-dot dot-blue"></div>Reasonable</div>
    <div class="legend-item"><div class="legend-border"></div>Germany border</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num">32</div><div class="stat-label">Programs</div></div>
    <div class="stat"><div class="stat-num">28</div><div class="stat-label">Cities</div></div>
    <div class="stat"><div class="stat-num">30</div><div class="stat-label">Free tuition</div></div>
  </div>
</header>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-handle" id="sidebarHandle"></div>
    <div class="sidebar-search">
      <input class="search-input" type="text" placeholder="Search university or city…" id="searchInput">
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all" id="btn-all">All</button>
        <button class="filter-btn" data-filter="top" id="btn-top">⭐ Top</button>
        <button class="filter-btn" data-filter="free" id="btn-free">Free</button>
      </div>
    </div>
    <div class="bookmark-bar" id="bookmarkBar">
      <span class="bookmark-count" id="bookmarkCount"><strong>0</strong> in watchlist</span>
      <div class="bookmark-actions">
        <button class="bookmark-action-btn primary" id="copyLinkBtn" type="button">Copy link</button>
        <button class="bookmark-action-btn" id="watchlistBtn" type="button" aria-pressed="false">Watchlist</button>
        <button class="bookmark-action-btn" id="clearBookmarksBtn" type="button">Clear</button>
      </div>
    </div>
    <div class="uni-list" id="uniList"></div>
  </div>
  <div id="map"></div>
</div>

const TIER_COLOR = { top: '#c9a84c', good: '#4caf72', reasonable: '#4c8ecf' };
const TIER_LABEL = { top: '⭐ Top Priority', good: '✅ Good Choice', reasonable: '🔵 Reasonable' };
const TIER_CLASS = { top: 'rank-gold', good: 'rank-green', reasonable: 'rank-blue' };
const TIER_POPUP = { top: 'tier-top', good: 'tier-good', reasonable: 'tier-reasonable' };
const TIER_ORDER = { top: 0, good: 1, reasonable: 2 };

function buildGroups() {
  const order = [];
  const byName = new Map();
  UNIS.forEach((uni, i) => {
    if (!byName.has(uni.name)) {
      byName.set(uni.name, { name: uni.name, city: uni.city, lat: uni.lat, lng: uni.lng, programs: [], indices: [] });
      order.push(byName.get(uni.name));
    }
    const group = byName.get(uni.name);
    group.programs.push(uni);
    group.indices.push(i);
  });
  return order;
}

function groupBestRank(group) {
  return Math.min(...group.programs.map(p => p.rank));
}

function groupBestTier(group) {
  return group.programs.reduce((best, p) => TIER_ORDER[p.tier] < TIER_ORDER[best] ? p.tier : best, 'reasonable');
}

function badgeStyle(tier) {
  const bg = tier === 'reasonable' ? '#1e2330' : TIER_COLOR[tier];
  const color = tier === 'reasonable' ? '#7a8099' : '#000';
  const border = tier === 'reasonable' ? '1px solid #4c8ecf' : 'none';
  return `background:${bg};color:${color};border:${border};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;`;
}

// Markers grouped by university name

function createIcon(uni) {
  const color = TIER_COLOR[uni.tier];
  const bg = uni.tier === 'top' ? color : uni.tier === 'good' ? color : '#1e2330';
  const textColor = uni.tier === 'reasonable' ? '#7a8099' : '#000';
  const border = uni.tier === 'reasonable' ? `2px solid ${color}` : 'none';
  return L.divIcon({
    className: '',
    html: `<div style="width:28px;height:28px;border-radius:50%;background:${bg};border:${border};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:10px;color:${textColor};box-shadow:0 2px 8px rgba(0,0,0,0.5);cursor:pointer;">${uni.rank}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16]
  });
}

function feesDisplay(f) {
  if (f === 'free') return '<span class="tag tag-free">Free tuition</span>';
  if (f === 'paid') return '<span class="tag tag-fee">€1,500 / sem</span>';
  return '<span class="tag tag-varied">Varied fees</span>';
}

function jobsDisplay(j) {
  return j === 'high'
    ? '<span class="tag tag-jobs-h">High job market</span>'
    : '<span class="tag tag-jobs-m">Moderate jobs</span>';
}

function semDisplay(d) {
  return d === 3 ? '<span class="tag tag-sem3">3 semesters</span>' : '';
}

function buildProgramBlock(uni) {
  return `
    <div class="popup-prog-block">
      <div class="popup-prog-header">
        <div class="popup-badge ${TIER_CLASS[uni.tier]}" style="${badgeStyle(uni.tier)}">${uni.rank}</div>
        <div class="popup-prog-title">${uni.prog}</div>
      </div>
      <div class="popup-row">
        <span class="popup-label">Duration</span>
        <span class="popup-value">${uni.duration} semesters</span>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">
        ${feesDisplay(uni.fees)}
        ${jobsDisplay(uni.jobs)}
        ${semDisplay(uni.duration)}
      </div>
      <div class="popup-note">${uni.note}</div>
      <a class="popup-link" href="${uni.link}" target="_blank">View on DAAD ↗</a>
    </div>`;
}

function buildGroupPopup(group) {
  const bestTier = groupBestTier(group);
  const bestRank = groupBestRank(group);
  const multi = group.programs.length > 1;
  const progBlocks = group.programs.map(buildProgramBlock).join('<hr class="popup-divider">');
  return `
    <div class="popup-inner${multi ? ' scrollable' : ''}">
      <div class="popup-rank-row">
        <div class="popup-badge ${TIER_CLASS[bestTier]}" style="${badgeStyle(bestTier)}">${bestRank}</div>
        <span class="popup-tier ${TIER_POPUP[bestTier]}">${TIER_LABEL[bestTier]}</span>
      </div>
      <div class="popup-uni-name">${group.name}</div>
      ${multi ? `<div class="popup-prog-count">${group.programs.length} programs at this university</div>` : ''}
      <div class="popup-row">
        <span class="popup-label">City</span>
        <span class="popup-value">${group.city}</span>
      </div>
      <hr class="popup-divider">
      ${progBlocks}
    </div>`;
}

const GROUPS = buildGroups();
const markersByName = {};
const BOOKMARK_KEY = 'germany-cs-map-bookmarks';
let bookmarks = new Set();
let watchlistMode = false;
let activeIndex = null;
let currentFilter = 'all';
let searchText = '';
let activeFlyId = 0;
let toastTimer = null;

function isBookmarked(rank) {
  return bookmarks.has(rank);
}

function groupHasBookmark(group) {
  return group.programs.some(p => bookmarks.has(p.rank));
}

function validRank(rank) {
  return UNIS.some(u => u.rank === rank);
}

function loadBookmarks() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('bm');
  if (fromUrl) {
    bookmarks = new Set(fromUrl.split(',').map(Number).filter(validRank));
    localStorage.setItem(BOOKMARK_KEY, JSON.stringify([...bookmarks]));
    if (bookmarks.size) watchlistMode = true;
    return;
  }
  try {
    const stored = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
    bookmarks = new Set(stored.filter(validRank));
  } catch (e) {
    bookmarks = new Set();
  }
}

function saveBookmarks() {
  localStorage.setItem(BOOKMARK_KEY, JSON.stringify([...bookmarks].sort((a, b) => a - b)));
  syncUrl();
}

function syncUrl() {
  const url = new URL(window.location.href);
  const ranks = [...bookmarks].sort((a, b) => a - b);
  if (ranks.length) url.searchParams.set('bm', ranks.join(','));
  else url.searchParams.delete('bm');
  history.replaceState(null, '', url);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('visible'), 2200);
}

function updateBookmarkBar() {
  const count = bookmarks.size;
  document.getElementById('bookmarkCount').innerHTML = `<strong>${count}</strong> in watchlist`;
  document.getElementById('clearBookmarksBtn').disabled = count === 0;
  document.getElementById('copyLinkBtn').disabled = count === 0;
  updateWatchlistButton();
}

function updateWatchlistButton() {
  const btn = document.getElementById('watchlistBtn');
  btn.classList.toggle('active-watchlist', watchlistMode);
  btn.setAttribute('aria-pressed', watchlistMode ? 'true' : 'false');
}

function toggleWatchlist() {
  if (!bookmarks.size) {
    showToast('Tap ★ on programs to add them first');
    return;
  }
  watchlistMode = !watchlistMode;
  updateWatchlistButton();
  updateMarkerVisibility();
  renderList();
  if (watchlistMode && isMobile()) openSidebar();
}

function toggleBookmark(rank, e) {
  if (e) e.stopPropagation();
  if (bookmarks.has(rank)) bookmarks.delete(rank);
  else bookmarks.add(rank);
  saveBookmarks();
  if (watchlistMode && !bookmarks.size) watchlistMode = false;
  updateMarkerVisibility();
  updateBookmarkBar();
  renderList();
}

function clearBookmarks() {
  if (!bookmarks.size) return;
  bookmarks.clear();
  saveBookmarks();
  watchlistMode = false;
  updateMarkerVisibility();
  updateBookmarkBar();
  renderList();
  showToast('Watchlist cleared');
}

async function copyBookmarkLink() {
  if (!bookmarks.size) {
    showToast('Save at least one program first');
    return;
  }
  syncUrl();
  const link = window.location.href;
  try {
    await navigator.clipboard.writeText(link);
    showToast('Link copied — share to show your bookmarks');
  } catch (e) {
    prompt('Copy this link:', link);
  }
}

function updateMarkerVisibility() {
  GROUPS.forEach(group => {
    const marker = markersByName[group.name];
    const show = !watchlistMode || groupHasBookmark(group);
    if (show) {
      if (!map.hasLayer(marker)) marker.addTo(map);
    } else {
      marker.closePopup();
      map.removeLayer(marker);
    }
  });
  if (watchlistMode && bookmarks.size > 0) fitBookmarkBounds();
}

function fitBookmarkBounds() {
  const visible = GROUPS.filter(groupHasBookmark);
  if (!visible.length) return;
  if (visible.length === 1) {
    map.flyTo([visible[0].lat, visible[0].lng], isMobile() ? 10 : 12, { duration: 1.25, easeLinearity: 0.22 });
    return;
  }
  const bounds = L.latLngBounds(visible.map(g => [g.lat, g.lng]));
  map.flyToBounds(bounds, { padding: [48, 48], duration: 1.25, easeLinearity: 0.22, maxZoom: isMobile() ? 10 : 12 });
}

GROUPS.forEach(group => {
  const rep = { rank: groupBestRank(group), tier: groupBestTier(group) };
  const marker = L.marker([group.lat, group.lng], { icon: createIcon(rep) });
  marker.bindPopup(buildGroupPopup(group), { maxWidth: 300 });
  marker.on('click', () => setActive(group.indices[0]));
  markersByName[group.name] = marker;
  marker.addTo(map);
});

// Sidebar list
function matchesFilter(uni) {
  if (watchlistMode && !isBookmarked(uni.rank)) return false;
  if (currentFilter === 'top') return uni.tier === 'top';
  if (currentFilter === 'free') return uni.fees === 'free';
  return true;
}

function updateFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active', 'active-green', 'active-blue');
    if (btn.dataset.filter !== currentFilter) return;
    btn.classList.add('active');
    if (currentFilter === 'top') btn.classList.add('active-green');
    else if (currentFilter === 'free') btn.classList.add('active-blue');
  });
}

function renderList() {
  const list = document.getElementById('uniList');
  list.innerHTML = '';
  let shown = 0;

  UNIS.forEach((uni, i) => {
    if (!matchesFilter(uni)) return;
    const matchSearch = searchText === '' ||
      uni.name.toLowerCase().includes(searchText) ||
      uni.city.toLowerCase().includes(searchText) ||
      uni.prog.toLowerCase().includes(searchText);
    if (!matchSearch) return;

    shown++;
    const saved = isBookmarked(uni.rank);
    const item = document.createElement('div');
    item.className = 'uni-item' + (activeIndex === i ? ' active' : '') + (saved ? ' bookmarked' : '');
    item.innerHTML = `
      <div class="uni-rank ${TIER_CLASS[uni.tier]}">${uni.rank}</div>
      <div class="uni-info">
        <div class="uni-name">${uni.name}</div>
        <div class="uni-prog">${uni.prog} · ${uni.city}</div>
        <div class="uni-tags">
          ${feesDisplay(uni.fees)}
          ${jobsDisplay(uni.jobs)}
          ${semDisplay(uni.duration)}
        </div>
      </div>
      <button class="bookmark-btn${saved ? ' saved' : ''}" type="button" aria-label="${saved ? 'Remove bookmark' : 'Add bookmark'}" title="${saved ? 'Remove bookmark' : 'Save bookmark'}">★</button>`;

    item.addEventListener('click', () => setActive(i));
    item.querySelector('.bookmark-btn').addEventListener('click', (e) => toggleBookmark(uni.rank, e));
    list.appendChild(item);
  });

  if (shown === 0) {
    list.innerHTML = watchlistMode
      ? `<div class="list-empty"><div class="list-empty-icon">★</div>Your watchlist is empty.<br>Tap ★ on any program to add it.</div>`
      : `<div class="list-empty">No programs match your search.</div>`;
  }
}

const sidebar = document.getElementById('sidebar');
const sidebarBackdrop = document.getElementById('sidebarBackdrop');
const mobileListToggle = document.getElementById('mobileListToggle');
const toggleIcon = document.getElementById('toggleIcon');
const toggleLabel = document.getElementById('toggleLabel');
const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

function openSidebar() {
  if (!isMobile()) return;
  sidebar.classList.add('open');
  sidebarBackdrop.classList.add('visible');
  mobileListToggle.classList.add('active');
  mobileListToggle.setAttribute('aria-expanded', 'true');
  toggleIcon.textContent = '✕';
  toggleLabel.textContent = 'Close List';
  setTimeout(() => map.invalidateSize(), 320);
}

function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarBackdrop.classList.remove('visible');
  mobileListToggle.classList.remove('active');
  mobileListToggle.setAttribute('aria-expanded', 'false');
  toggleIcon.textContent = '☰';
  toggleLabel.textContent = 'University List';
  setTimeout(() => map.invalidateSize(), 320);
}

function toggleSidebar() {
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
}

mobileListToggle.addEventListener('click', toggleSidebar);
sidebarBackdrop.addEventListener('click', closeSidebar);
document.getElementById('sidebarHandle').addEventListener('click', toggleSidebar);

function setActive(i) {
  activeIndex = i;
  const uni = UNIS[i];
  const marker = markersByName[uni.name];
  const flyId = ++activeFlyId;
  const target = [uni.lat, uni.lng];
  const zoom = isMobile() ? 10 : 12;
  const needsMove = map.getCenter().distanceTo(target) > 50 || Math.abs(map.getZoom() - zoom) > 0.25;

  marker.closePopup();

  if (needsMove) {
    map.once('moveend', () => {
      if (flyId !== activeFlyId) return;
      marker.openPopup();
    });
    map.flyTo(target, zoom, { duration: 1.25, easeLinearity: 0.22 });
  } else {
    marker.openPopup();
  }

  renderList();
  if (isMobile()) closeSidebar();
  const items = document.querySelectorAll('.uni-item');
  items.forEach(el => { if (el.classList.contains('active')) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    updateFilterButtons();
    updateMarkerVisibility();
    renderList();
  });
});

document.getElementById('copyLinkBtn').addEventListener('click', copyBookmarkLink);
document.getElementById('watchlistBtn').addEventListener('click', toggleWatchlist);
document.getElementById('clearBookmarksBtn').addEventListener('click', clearBookmarks);

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchText = e.target.value.toLowerCase().trim();
  renderList();
});

loadBookmarks();
updateBookmarkBar();
updateFilterButtons();
updateMarkerVisibility();
renderList();

window.addEventListener('resize', () => {
  if (!isMobile()) {
    closeSidebar();
    sidebar.classList.remove('open');
    sidebarBackdrop.classList.remove('visible');
  }
  map.invalidateSize();
});

window.addEventListener('orientationchange', () => {
  setTimeout(() => map.invalidateSize(), 300);
});
</script>
